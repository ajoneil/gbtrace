name: Deploy Site

on:
  workflow_run:
    workflows: [Generate Traces]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # Download WASM from latest build
      - name: Download WASM
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: wasm-pkg
          path: web/pkg
          branch: main

      # Download all available trace artifacts and merge them
      # Each trace artifact is named traces-{suite}-{emulator}
      - name: Download all trace artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: traces.yml
          name: traces-*
          name_is_regexp: true
          path: _trace_artifacts
          branch: main
          if_no_artifact_found: warn

      # Merge trace artifacts into build/traces/
      # Artifacts are in _trace_artifacts/traces-{suite}-{emulator}/...
      # We need to merge them by suite into build/traces/{suite}/
      - name: Merge traces
        run: |
          mkdir -p build/traces
          for dir in _trace_artifacts/traces-*/; do
            [ -d "$dir" ] || continue
            # Extract suite name: traces-{suite}-{emulator} -> {suite}
            basename=$(basename "$dir")
            suite=$(echo "$basename" | sed 's/^traces-//; s/-[^-]*$//')
            mkdir -p "build/traces/$suite"
            cp -rn "$dir"* "build/traces/$suite/" 2>/dev/null || true
          done
          # Regenerate manifests with merged data
          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            if [ -d "test-suites/$suite" ]; then
              python3 scripts/manifest.py "$suite_dir" "test-suites/$suite"
            fi
          done
          echo "Trace summary:"
          for suite_dir in build/traces/*/; do
            count=$(find "$suite_dir" -name '*.parquet' 2>/dev/null | wc -l)
            echo "  $(basename "$suite_dir"): $count traces"
          done

      # Assemble site
      - name: Assemble site
        run: |
          mkdir -p build/site/pkg build/site/tests
          cp web/index.html build/site/
          cp -r web/src build/site/
          cp web/pkg/gbtrace_wasm.js web/pkg/gbtrace_wasm_bg.wasm build/site/pkg/

          # Copy traces
          for suite_dir in build/traces/*/; do
            [ -d "$suite_dir" ] || continue
            suite=$(basename "$suite_dir")
            cp -r "$suite_dir" "build/site/tests/$suite"
          done

          # Copy ROMs for disassembly
          for suite in gbmicrotest blargg mooneye dmg-acid2; do
            if [ -d "build/site/tests/$suite" ] && [ -d "test-suites/$suite" ]; then
              cd "test-suites/$suite"
              find . -name '*.gb' -exec sh -c 'mkdir -p "../../build/site/tests/'"$suite"'/$(dirname "{}")" && cp "{}" "../../build/site/tests/'"$suite"'/{}"' \;
              cd ../..
            fi
          done

          # Copy profile TOMLs
          for suite in gbmicrotest blargg mooneye dmg-acid2; do
            toml="test-suites/$suite/$suite.toml"
            if [ -f "$toml" ] && [ -d "build/site/tests/$suite" ]; then
              cp "$toml" "build/site/tests/$suite/"
            fi
          done

          echo "Site assembled in build/site/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
