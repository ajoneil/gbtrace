name: Generate Traces

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite (all, gbmicrotest, blargg, mooneye, dmg-acid2)"
        default: "all"
        type: choice
        options: [all, gbmicrotest, blargg, mooneye, dmg-acid2]
      emulator:
        description: "Emulator (all, gambatte, sameboy, mgba, gateboy, missingno)"
        default: "all"
        type: choice
        options: [all, gambatte, sameboy, mgba, gateboy, missingno]

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          SUITES='["gbmicrotest","blargg","mooneye","dmg-acid2"]'
          EMUS='["gambatte","sameboy","mgba","gateboy","missingno"]'

          if [ "${{ inputs.suite }}" != "" ] && [ "${{ inputs.suite }}" != "all" ]; then
            SUITES='["${{ inputs.suite }}"]'
          fi
          if [ "${{ inputs.emulator }}" != "" ] && [ "${{ inputs.emulator }}" != "all" ]; then
            EMUS='["${{ inputs.emulator }}"]'
          fi

          echo "matrix={\"suite\":${SUITES},\"emulator\":${EMUS}}" >> "$GITHUB_OUTPUT"

  trace:
    needs: matrix-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pil

      # Download CLI from latest build
      - name: Download CLI
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: gbtrace-cli
          path: target/release
          branch: main

      - name: Make CLI executable
        run: chmod +x target/release/gbtrace-cli

      # Download adapter from latest build
      - name: Download adapter
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: adapter-${{ matrix.emulator }}
          path: adapters/${{ matrix.emulator }}
          branch: main

      - name: Make adapter executable
        run: chmod +x adapters/${{ matrix.emulator }}/gbtrace-${{ matrix.emulator }}

      # Cache traces
      - name: Cache traces
        id: cache-traces
        uses: actions/cache@v5
        with:
          path: build/traces/${{ matrix.suite }}
          key: traces-${{ matrix.suite }}-${{ matrix.emulator }}-${{ hashFiles(format('adapters/{0}/gbtrace-{0}.cpp', matrix.emulator), format('adapters/{0}/gbtrace-{0}.c', matrix.emulator), format('test-suites/{0}/**', matrix.suite), format('scripts/trace-{0}.sh', matrix.suite), 'scripts/trace-screenshot.sh', 'crates/gbtrace/src/**') }}

      # Generate pix references if needed
      - name: Generate pix references
        if: steps.cache-traces.outputs.cache-hit != 'true'
        run: make pix-refs

      # Generate traces by running scripts directly (no make, no adapter rebuild)
      - name: Generate traces
        if: steps.cache-traces.outputs.cache-hit != 'true'
        run: |
          SUITE="${{ matrix.suite }}"
          EMU="${{ matrix.emulator }}"
          BIN="adapters/${EMU}/gbtrace-${EMU}"
          TRACE_DIR="build/traces/${SUITE}"
          ROM_DIR="test-suites/${SUITE}"
          mkdir -p "$TRACE_DIR"

          MAX_JOBS=$(nproc)

          # Run a command in the background, limiting parallelism
          run_parallel() {
            while [ "$(jobs -r | wc -l)" -ge "$MAX_JOBS" ]; do wait -n 2>/dev/null || true; done
            "$@" || true &
          }

          case "$SUITE" in
            gbmicrotest)
              PROFILE="test-suites/gbmicrotest/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-gbmicrotest.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            blargg)
              PROFILE="test-suites/blargg/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-blargg.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            mooneye)
              PROFILE="test-suites/mooneye/profile.toml"
              while IFS= read -r -d '' rom; do
                run_parallel bash scripts/trace-mooneye.sh "$BIN" "$rom" "$PROFILE" "$TRACE_DIR" "$ROM_DIR"
              done < <(find "$ROM_DIR" -name '*.gb' -print0 | sort -z)
              ;;
            dmg-acid2)
              PROFILE="test-suites/dmg-acid2/profile.toml"
              REF="test-suites/dmg-acid2/reference.pix"
              bash scripts/trace-screenshot.sh "$BIN" \
                "test-suites/dmg-acid2/dmg-acid2.gb" "$PROFILE" "$REF" "$TRACE_DIR" 30 || true
              ;;
          esac

          # Wait for all background jobs, don't fail if some tests failed
          wait 2>/dev/null || true

          python3 scripts/manifest.py "$TRACE_DIR" "$ROM_DIR"
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/adapters/sameboy/SameBoy/build/lib
          CLI: ${{ github.workspace }}/target/release/gbtrace-cli
        timeout-minutes: 120

      - name: Upload traces
        uses: actions/upload-artifact@v6
        with:
          name: traces-${{ matrix.suite }}-${{ matrix.emulator }}
          path: build/traces/${{ matrix.suite }}
          retention-days: 90
