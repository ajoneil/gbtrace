[profile]
name = "blargg_cpu"
description = "CPU registers + Blargg test result address for cpu_instrs and similar tests."
trigger = "instruction"

[fields]
cpu = ["pc", "sp", "a", "f", "b", "c", "d", "e", "h", "l", "op"]
serial = ["sb", "sc"]

[fields.memory]
# Blargg test ROMs write result to 0xA000:
#   0x80 = passed, 0x81+ = failed, other = still running
test_result = "A000"
